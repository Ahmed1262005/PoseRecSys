# ==============================================================================
# OutfitTransformer - Nginx Reverse Proxy (Cloudflare Origin)
# ==============================================================================
# SSL is terminated by Cloudflare at the edge. The origin certificate
# encrypts traffic between Cloudflare and this server (Full Strict mode).
# No certbot needed -- the origin cert is valid for 15 years.
#
# Setup:
#   1. Generate origin cert in Cloudflare dashboard -> SSL/TLS -> Origin Server
#   2. Save cert to  ssl/origin.pem  and key to  ssl/origin-key.pem
#   3. Set Cloudflare SSL mode to "Full (Strict)"
# ==============================================================================

upstream api {
    server api:8000;
}

# Rate limiting: 30 req/s per real client IP (from CF-Connecting-IP header)
limit_req_zone $http_cf_connecting_ip zone=api_limit:10m rate=30r/s;

# --- Reject requests not coming through Cloudflare on port 80 ---
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

# --- HTTPS: Cloudflare Origin ---
server {
    listen 443 ssl http2;
    server_name api.usepose.com;

    # Cloudflare Origin Certificate (generate in CF dashboard)
    ssl_certificate     /etc/ssl/origin.pem;
    ssl_certificate_key /etc/ssl/origin-key.pem;

    # SSL config
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Only allow Cloudflare to connect (optional but recommended)
    # Verify using Cloudflare's Authenticated Origin Pull cert
    # ssl_client_certificate /etc/ssl/cloudflare-origin-pull.pem;
    # ssl_verify_client on;

    # Security headers (Cloudflare adds some, but belt-and-suspenders)
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    # Max upload size (Canvas image uploads)
    client_max_body_size 10M;

    # Gzip (Cloudflare also compresses, but this reduces origin -> CF bandwidth)
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 1000;

    # --- API endpoints ---
    location / {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-For $http_cf_connecting_ip;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-ID $request_id;

        # Timeouts (hybrid search can take up to 15s)
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }

    # --- Health checks (no rate limiting, no access logs) ---
    location /health {
        proxy_pass http://api;
        access_log off;
    }

    location /ready {
        proxy_pass http://api;
        access_log off;
    }

    location /live {
        proxy_pass http://api;
        access_log off;
    }
}
