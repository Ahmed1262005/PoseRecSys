# ==============================================================================
# OutfitTransformer - CI/CD Pipeline
# ==============================================================================
# Triggers on push to main:
#   1. Run unit tests
#   2. SSH into EC2 and deploy via docker compose
# ==============================================================================

name: Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Unit Tests (runs on every push and PR)
  # ---------------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Run unit tests
        run: |
          PYTHONPATH=src python -m pytest tests/unit/ -v --tb=short
        env:
          # Minimal env for tests (services are mocked)
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_KEY: test-key
          SUPABASE_JWT_SECRET: test-secret
          ALGOLIA_APP_ID: test
          ALGOLIA_SEARCH_KEY: test

  # ---------------------------------------------------------------------------
  # Deploy to EC2 (only on push to main, after tests pass)
  # ---------------------------------------------------------------------------
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e

            DEPLOY_DIR="/opt/outfit-transformer"
            REPO_URL="https://github.com/Ahmed1262005/PoseRecSys.git"

            # First-time setup: clone the repo if directory doesn't exist
            if [ ! -d "$DEPLOY_DIR" ]; then
              echo "=== First deploy: cloning repo ==="
              sudo mkdir -p "$DEPLOY_DIR"
              sudo chown "$(whoami):$(whoami)" "$DEPLOY_DIR"
              git clone "$REPO_URL" "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"

            # Pre-flight: .env must exist (create manually once via SSH)
            if [ ! -f .env ]; then
              echo "ERROR: .env file not found at $DEPLOY_DIR/.env"
              echo ""
              echo "SSH into the EC2 and create it:"
              echo "  sudo cp $DEPLOY_DIR/.env.example $DEPLOY_DIR/.env"
              echo "  sudo nano $DEPLOY_DIR/.env   # fill in real values"
              echo ""
              echo "Required vars: SUPABASE_URL, SUPABASE_SERVICE_KEY,"
              echo "  SUPABASE_JWT_SECRET, ALGOLIA_APP_ID, ALGOLIA_SEARCH_KEY"
              exit 1
            fi

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Building Docker image ==="
            docker compose build

            echo "=== Deploying ==="
            docker compose up -d

            echo "=== Waiting for health check ==="
            sleep 10
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "Health check passed!"
                exit 0
              fi
              echo "Waiting for API to become healthy... ($i/30)"
              sleep 5
            done
            echo "ERROR: Health check failed after 150 seconds"
            docker compose logs api --tail 50
            exit 1
