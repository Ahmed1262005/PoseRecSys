# ==============================================================================
# OutfitTransformer - Docker Compose (Production)
# ==============================================================================
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f api    # Follow API logs
#   docker compose down           # Stop all services
# ==============================================================================

services:
  # ---------------------------------------------------------------------------
  # API Server (FastAPI + FashionCLIP + SASRec)
  # ---------------------------------------------------------------------------
  api:
    build: .
    container_name: outfit-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      # Datadog APM — ddtrace-run reads these automatically
      DD_SERVICE: outfit-api
      DD_ENV: production
      DD_VERSION: "3.0.0"
      # host.docker.internal reaches the DD agent running on the host/separate container
      DD_AGENT_HOST: host.docker.internal
      DD_TRACE_AGENT_PORT: "8126"
      DD_LOGS_INJECTION: "true"
      DD_TRACE_SAMPLE_RATE: "1"
    volumes:
      - ./models:/app/models:ro
      - ./data/recbole:/app/data/recbole:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      com.datadoghq.ad.logs: '[{"source": "python", "service": "outfit-api"}]'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Redis (session state + caching)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: outfit-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Nginx (reverse proxy + Cloudflare Origin SSL + rate limiting)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: outfit-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/ssl:ro
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
